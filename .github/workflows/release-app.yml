name: Release GW2onMac App

on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"
  workflow_dispatch:
    inputs:
      version:
        description: "App version (e.g. 0.1.0)"
        required: true
        default: "0.1.0"

jobs:
  build-app:
    runs-on: macos-15
    env:
      APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_NOTARY_PASSWORD: ${{ secrets.APPLE_NOTARY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Bundle font install helpers
        run: |
          brew install cabextract
          cp "$(brew --prefix cabextract)/bin/cabextract" GW2onMac/Resources/cabextract
          chmod +x GW2onMac/Resources/cabextract

      - name: Build GW2onMac (Release)
        run: |
          DERIVED="$RUNNER_TEMP/DerivedData"
          xcodebuild \
            -project GW2onMac.xcodeproj \
            -scheme GW2onMac \
            -configuration Release \
            -derivedDataPath "$DERIVED" \
            -destination 'generic/platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            build
          echo "APP_PATH=$DERIVED/Build/Products/Release/GW2onMac.app" >> "$GITHUB_ENV"

      - name: Import signing certificate
        if: env.APPLE_CERTIFICATE_BASE64 != ''
        env:
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN"
          echo "KEYCHAIN_PATH=$KEYCHAIN" >> "$GITHUB_ENV"

      - name: Sign app
        if: env.APPLE_CERTIFICATE_BASE64 != ''
        env:
          SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          codesign --force --options runtime --sign "$SIGNING_IDENTITY" --entitlements GW2onMac/GW2onMac.entitlements "$APP_PATH"

      - name: Create DMG
        run: |
          VERSION="${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}"
          VERSION="${VERSION#v}"
          DMG="GW2onMac-${VERSION}.dmg"
          chmod +x Scripts/package-dmg.sh
          ./Scripts/package-dmg.sh "$APP_PATH" "$DMG"
          echo "DMG_PATH=$DMG" >> "$GITHUB_ENV"

      - name: Notarize DMG
        if: env.APPLE_ID != '' && env.APPLE_NOTARY_PASSWORD != ''
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_NOTARY_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$DMG_PATH"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gw2onmac-app
          path: ${{ env.DMG_PATH }}

  publish-release:
    needs: build-app
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download DMG artifact
        uses: actions/download-artifact@v4
        with:
          name: gw2onmac-app
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: GW2onMac ${{ github.ref_name }}
          files: dist/*
          generate_release_notes: true
